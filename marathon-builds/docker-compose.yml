version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    volumes:
      # Сохранение БД и загруженных файлов при перезапуске контейнера
      - ./backend/instance:/app/instance
      - ./backend/app/static/uploads:/app/app/static/uploads
    env_file:
      - ./backend/.env
    expose:
      - "5000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend